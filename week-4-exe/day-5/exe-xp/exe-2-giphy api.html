<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Giphy App</title>
</head>
<body>

  <h1>Giphy Fetch Practice</h1>

  <script >
    const url2 = "https://api.giphy.com/v1/gifs/search?q=sun&limit=10&offset=2&rating=g&api_key=hpvZycW22qCjn5cRM1xtWB8NKq4dQ2My";

fetch(url2)
  .then(response => {
    if (!response.ok) {
      throw new Error("Failed to fetch gifs");
    }
    return response.json();
  })
  .then(data => {
    console.log(data);
  })
  .catch(error => {
    console.error(error);
  });
  </script>
</body>
</html>
