OCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Challenge: Create a solar system</title>
        <style>
            body {
                background-color: black;
                padding: 10px;
            }
            .planet {
                width: 100px;
                height: 100px;
                border-radius: 50%;
                text-align: center;
                padding: 10px;
                position: relative;
                border: 2px solid white;
            }
            .moon {
                position: absolute;
                width: 30px;
                height: 30px;
                border-radius: 50%;
                background: rgb(237, 237, 237);
                border: 5px solid red;
            }
        </style>
    </head>
    <body>

    <section class="listPlanets"></section>

<script>

const planets = [
    { name: "Mercury", color: "gray", moons: 0 },
    { name: "Venus", color: "orange", moons: 0 },
    { name: "Earth", color: "blue", moons: 1 },
    { name: "Mars", color: "red", moons: 2 },
    { name: "Jupiter", color: "brown", moons: 79 },
    { name: "Saturn", color: "yellow", moons: 82 },
    { name: "Uranus", color: "lightblue", moons: 27 },
    { name: "Neptune", color: "darkblue", moons: 14 }
];


const section = document.querySelector(".listPlanets");

planets.forEach((planetData) => {
    // Create the planet div
    const planetDiv = document.createElement("div");
    
   
    planetDiv.classList.add("planet");
    planetDiv.style.backgroundColor = planetData.color;
    

    planetDiv.textContent = planetData.name;

    // --- Bonus ---
    for (let i = 0; i < planetData.moons; i++) {
        const moonDiv = document.createElement("div");
        moonDiv.classList.add("moon");
        
        moonDiv.style.left = (i * 10) + "px"; 
        
        planetDiv.appendChild(moonDiv);
    }

    // 4. 
    section.appendChild(planetDiv);
});
</script>
</body>
</html>
